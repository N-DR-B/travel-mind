{% extends "base.html" %}
{% block content %}
<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="s-hdr">
    <div class="a">🧳</div>
    <div class="i"><div class="nm">旅行对话</div><div class="sb">多智能体协作中</div></div>
  </div>
  <div class="msgs" id="chatMessages">
    <div class="msg"><div class="av" style="background:linear-gradient(135deg,#1E3A5F,#4A8BC2);color:white">🧳</div><div class="bb ai"><span class="ld"></span>你好！我是 TravelMind。<br>告诉我你想去哪里旅行 ✨</div></div>
  </div>
  <div class="qr" id="quickRow">
    <span class="ch" onclick="useExample('我想去日本东京玩5天，预算1万')">🇯🇵 东京5天</span>
    <span class="ch" onclick="useExample('去泰国曼谷带家人玩一周，喜欢美食')">🇹🇭 曼谷美食</span>
    <span class="ch" onclick="useExample('去巴黎度蜜月，7天预算3万')">🇫🇷 巴黎蜜月</span>
    <span class="ch" onclick="useExample('去新加坡自由行4天')">🇸🇬 新加坡4天</span>
  </div>
  <div class="ir">
    <div class="iw">
      <input type="text" id="chatInput" placeholder="输入旅行需求，例如：去日本东京玩5天..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
      <button class="sbtn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2z"/></svg></button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="mnav">
    <div class="ml">
      <div class="lg" onclick="document.getElementById('resultsContainer').innerHTML='';document.getElementById('welcomeScreen').style.display='flex'">TravelMind</div>
      <div class="sp"></div>
      <div class="st"><span class="dt"></span>DeepSeek 已连接</div>
    </div>
    <div class="mr">
      <div class="ac" id="agentBadge"><span class="nm">8</span> Agents <span style="margin-left:4px;font-size:10px;color:var(--stone-400)">🧠→📋→📝</span></div>
      <div class="ui">王</div>
    </div>
  </div>
  <div class="sa" id="scrollArea">

    <!-- Welcome Screen -->
    <div class="wc" id="welcomeScreen">
      <div class="wi">🧳</div>
      <div class="wt">开始你的旅行规划</div>
      <div class="wd">在左侧输入你的旅行需求，多智能体系统将自动为你分析目的地、编排行程、比价机酒、提醒签证事项，生成完整的旅行方案。</div>
      <div class="we">
        <button class="eb" onclick="useExample('我想去日本东京玩5天，预算1万')">🇯🇵 东京5日游</button>
        <button class="eb" onclick="useExample('去泰国曼谷带家人玩一周，喜欢美食')">🇹🇭 曼谷美食之旅</button>
        <button class="eb" onclick="useExample('去巴黎度蜜月，7天预算3万')">🇫🇷 巴黎蜜月行</button>
        <button class="eb" onclick="useExample('去新加坡自由行4天，购物为主')">🇸🇬 新加坡购物游</button>
      </div>
    </div>

    <!-- Results Container -->
    <div id="resultsContainer"></div>

  </div>
</div>
{% endblock %}
